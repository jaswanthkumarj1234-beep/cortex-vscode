<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Cortex C-mark with memory dots — activity bar icon -->
  <!-- Uses currentColor for VS Code theme compatibility -->
  <path d="M 12 3 A 7.5 7.5 0 0 0 4.5 10.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M 4.5 10.5 A 7.5 7.5 0 0 0 12 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.90"/>
  <!-- Memory dots -->
  <circle cx="14" cy="3.5" r="1.2" fill="currentColor" opacity="0.95"/>
  <circle cx="16" cy="5" r="0.75" fill="currentColor" opacity="0.7"/>
  <circle cx="17.5" cy="9.5" r="1" fill="currentColor" opacity="0.85"/>
  <circle cx="18.5" cy="12" r="0.65" fill="currentColor" opacity="0.65"/>
  <circle cx="17.5" cy="14.5" r="0.8" fill="currentColor" opacity="0.75"/>
  <circle cx="14" cy="17.5" r="1.2" fill="currentColor" opacity="0.95"/>
  <circle cx="16" cy="16" r="0.75" fill="currentColor" opacity="0.7"/>
  <!-- Connection lines -->
  <g stroke="currentColor" stroke-width="0.4" opacity="0.25">
    <line x1="14" y1="3.5" x2="16" y2="5"/>
    <line x1="16" y1="5" x2="17.5" y2="9.5"/>
    <line x1="17.5" y1="9.5" x2="18.5" y2="12"/>
    <line x1="18.5" y1="12" x2="17.5" y2="14.5"/>
    <line x1="17.5" y1="14.5" x2="16" y2="16"/>
    <line x1="16" y1="16" x2="14" y2="17.5"/>
    <line x1="14" y1="3.5" x2="17.5" y2="9.5"/>
    <line x1="17.5" y1="9.5" x2="14" y2="17.5"/>
  </g>
</svg>
