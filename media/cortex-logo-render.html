<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cortex Icon Export</title>
<style>
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    gap: 30px;
    padding: 40px;
  }
  h1 { font-size: 20px; opacity: 0.5; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 40px; align-items: flex-end; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .card label { font-size: 12px; opacity: 0.4; letter-spacing: 1px; }
  button {
    padding: 10px 20px;
    background: #F97316;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    margin-top: 20px;
  }
  button:hover { background: #EA580C; }
  #status { color: #22C55E; font-size: 14px; min-height: 24px; }
</style>
</head>
<body>
<h1>Cortex MCP — Exact Brand-Kit Logo</h1>

<!-- The EXACT SVG from docs/brand-kit.md Dark variant -->
<div class="row">
  <div class="card">
    <svg id="logoSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
      <defs>
        <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#F97316"/>
          <stop offset="100%" style="stop-color:#F59E0B"/>
        </linearGradient>
      </defs>
      <rect width="256" height="256" rx="56" fill="#1C1917"/>
      <path d="M 128 48 A 62 62 0 0 0 66 110" stroke="url(#g)" stroke-width="22" stroke-linecap="round" fill="none"/>
      <path d="M 66 110 A 62 62 0 0 0 128 172" stroke="url(#g)" stroke-width="22" stroke-linecap="round" fill="none"/>
      <circle cx="145" cy="52" r="9" fill="#F97316" opacity="0.95"/>
      <circle cx="165" cy="65" r="5.5" fill="#F59E0B" opacity="0.7"/>
      <circle cx="178" cy="108" r="7.5" fill="#F97316" opacity="0.85"/>
      <circle cx="190" cy="130" r="5" fill="#FB923C" opacity="0.7"/>
      <circle cx="185" cy="155" r="6" fill="#F59E0B" opacity="0.75"/>
      <circle cx="145" cy="168" r="9" fill="#F97316" opacity="0.95"/>
      <circle cx="165" cy="156" r="5.5" fill="#F59E0B" opacity="0.7"/>
      <g stroke="#F97316" stroke-width="1" opacity="0.3">
        <line x1="145" y1="52" x2="165" y2="65"/>
        <line x1="165" y1="65" x2="178" y2="108"/>
        <line x1="178" y1="108" x2="190" y2="130"/>
        <line x1="190" y1="130" x2="185" y2="155"/>
        <line x1="185" y1="155" x2="165" y2="156"/>
        <line x1="165" y1="156" x2="145" y2="168"/>
        <line x1="145" y1="52" x2="178" y2="108"/>
        <line x1="178" y1="108" x2="145" y2="168"/>
      </g>
    </svg>
    <label>256×256 — Exact brand-kit dark variant</label>
  </div>

  <div class="card">
    <canvas id="canvas512" width="512" height="512" style="border-radius:12px;"></canvas>
    <label>512×512 — PNG Preview</label>
  </div>
</div>

<button id="downloadBtn">⬇ Download icon.png (256×256)</button>
<button id="download512Btn">⬇ Download icon-512.png (512×512)</button>
<div id="status"></div>

<script>
function svgToPng(svgEl, size) {
  return new Promise((resolve) => {
    const svgData = new XMLSerializer().serializeToString(svgEl);
    const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.src = url;
  });
}

const svg = document.getElementById('logoSvg');

// Render 512px preview
svgToPng(svg, 512).then(canvas => {
  const preview = document.getElementById('canvas512');
  const ctx = preview.getContext('2d');
  ctx.drawImage(canvas, 0, 0);
});

// Download 256px
document.getElementById('downloadBtn').onclick = async () => {
  const canvas = await svgToPng(svg, 256);
  const a = document.createElement('a');
  a.download = 'icon.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  document.getElementById('status').textContent = '✓ icon.png downloaded (256×256)';
};

// Download 512px
document.getElementById('download512Btn').onclick = async () => {
  const canvas = await svgToPng(svg, 512);
  const a = document.createElement('a');
  a.download = 'icon-512.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
  document.getElementById('status').textContent = '✓ icon-512.png downloaded (512×512)';
};
</script>
</body>
</html>
